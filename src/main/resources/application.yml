spring:
  application:
    name: yu-ai-agent
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api

#springdoc-openapi 接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html           # Swagger UI 访问路径
    tags-sorter: alpha               # 标签按字母顺序排序
    operations-sorter: alpha         # 接口按字母顺序排序
  api-docs:
    path: /v3/api-docs               # OpenAPI 文档 JSON 地址
  group-configs:
    - group: 'default'               # 分组名称
      paths-to-match: '/**'          # 匹配所有路径
      packages-to-scan: com.yupi.yuaiagent.controller  # 扫描的包路径
knife4j:
  enable: true                       # 启用 Knife4j 增强功能
  setting:
    language: zh_cn                  # 界面语言设置为中文
logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug
search-api:
  api-key: